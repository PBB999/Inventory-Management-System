version: '3.9'

services:
  mongodb:
    image: mongo:7.0
    container_name: pos_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: pos_system
    volumes:
      - mongo_data:/data/db
    networks:
      - pos_network

  redis:
    image: redis:7.2-alpine
    container_name: pos_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - pos_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pos_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/pos_system
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_please}
      JWT_EXPIRES_IN: 7d
      ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      - mongodb
      - redis
    networks:
      - pos_network
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000
    container_name: pos_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - pos_network

volumes:
  mongo_data:
  redis_data:

networks:
  pos_network:
    driver: bridge
